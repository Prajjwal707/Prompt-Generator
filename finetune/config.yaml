# Fine-tuning configuration for PromptGenius
# LoRA/QLoRA fine-tuning parameters

# Model configuration
model:
  base_model: "meta-llama/Llama-2-7b-chat-hf"
  tokenizer: "meta-llama/Llama-2-7b-chat-hf"
  trust_remote_code: true
  use_auth_token: false  # Set to true if using gated models

# Dataset configuration
dataset:
  train_file: "promptgenius_training_data.json"
  validation_split: 0.1
  max_length: 512
  text_field: "user_prompt"
  label_field: "enhanced_prompt"

# Training configuration
training:
  output_dir: "finetune/checkpoints"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  fp16: true
  dataloader_num_workers: 4
  remove_unused_columns: false

# LoRA configuration
lora:
  r: 16  # rank
  lora_alpha: 32
  target_modules: ["q_proj", "v_proj", "k_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  lora_dropout: 0.1
  bias: "none"
  task_type: "CAUSAL_LM"
  inference_mode: false

# QLoRA configuration (4-bit quantization)
qlora:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true
  bnb_4bit_quant_type: "nf4"

# Evaluation configuration
evaluation:
  metrics: ["bleu", "rouge", "perplexity"]
  generation_config:
    max_new_tokens: 256
    temperature: 0.7
    top_p: 0.9
    do_sample: true
    pad_token_id: 0

# Hardware configuration
hardware:
  device: "auto"  # auto, cpu, cuda
  mixed_precision: "fp16"
  gradient_checkpointing: true
  dataloader_pin_memory: true

# Logging configuration
logging:
  project_name: "promptgenius-finetune"
  experiment_name: "llama2-7b-lora"
  log_to_wandb: false
  log_to_tensorboard: true
  report_to: ["tensorboard"]

# Early stopping
early_stopping:
  enabled: true
  patience: 3
  min_delta: 0.001

# Checkpointing
checkpointing:
  save_strategy: "steps"
  save_steps: 500
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"

# Optimization
optimization:
  optimizer: "adamw_torch"
  scheduler: "cosine"
  warmup_steps: 100
  max_steps: -1  # -1 means use num_train_epochs
