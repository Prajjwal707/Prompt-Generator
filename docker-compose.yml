version: '3.8'

services:
  promptgenius-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: promptgenius-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=5000
      - LOG_LEVEL=INFO
      - ENABLE_MONITORING=True
      - MONITOR_LOG_RETENTION_DAYS=30
    volumes:
      # Model volume - mount your model files here
      - ./models:/app/models:ro
      # Logs volume - persist logs
      - ./logs:/app/logs
      # Checkpoints volume - persist fine-tuning checkpoints
      - ./finetune/checkpoints:/app/finetune/checkpoints
      # Config volume - for API keys and settings
      - ./config:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - promptgenius-network

  # Optional: Redis for rate limiting and caching
  redis:
    image: redis:7-alpine
    container_name: promptgenius-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - promptgenius-network
    command: redis-server --appendonly yes

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: promptgenius-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - promptgenius-backend
    restart: unless-stopped
    networks:
      - promptgenius-network

volumes:
  redis-data:
    driver: local

networks:
  promptgenius-network:
    driver: bridge
